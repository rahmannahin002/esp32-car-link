name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Instead of using the wrapper, we install a specific Gradle version
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.1.1 # This installs the tool manually
        cache-disabled: true 

    - name: Build with Gradle
      # We use 'gradle' instead of './gradlew'
      run: |
        cd ESPCarLink
        gradle assembleDebug